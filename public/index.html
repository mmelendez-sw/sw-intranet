<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#003366">
    <title>Symphony Towers Infrastructure Intranet</title>
    <link rel="manifest" href="/site.webmanifest">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <!-- <script src="https://kit.fontawesome.com/82c7128914.js" crossorigin="anonymous"></script> -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
</head>
<body>
    <div id="root">
        <div class="app-loading" role="status" aria-label="Loading">
            <div class="app-loading-spinner" aria-hidden="true"></div>
        </div>
    </div>
    <style>
        .app-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .app-loading-spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(0, 51, 102, 0.15);
            border-top-color: #003366;
            border-radius: 50%;
            animation: app-loading-spin 0.75s linear infinite;
        }
        @keyframes app-loading-spin {
            to { transform: rotate(360deg); }
        }
    </style>
</body>
</html>
